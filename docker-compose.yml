version: "3.9"

services:

  postgres:
    image: postgres:17
    container_name: flowforge_postgres
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flowforge

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: flowforge_redis
    restart: always

    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: flowforge_api
    restart: always

    ports:
      - "8080:8080"

    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: flowforge_worker
    restart: always

    command: ./worker

    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: flowforge_frontend
    restart: always

    ports:
      - "3000:3000"

    depends_on:
      - api

volumes:
  postgres_data: